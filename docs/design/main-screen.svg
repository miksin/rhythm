<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 730" width="980" height="730">
  <rect width="980" height="730" fill="#ffffff"/>
  <!-- Title -->
  <text x="490" y="48" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e1e1e">Rhythm App — Main Screen Layout</text>
  <!-- App shell -->
  <rect x="40" y="60" width="900" height="700" rx="4" fill="#f8f9fa" stroke="#868e96" stroke-width="2"/>
  <!-- Header -->
  <rect x="40" y="60" width="900" height="70" rx="4" fill="#1971c2" stroke="#1971c2" stroke-width="2"/>
  <text x="490" y="104" font-family="monospace" font-size="26" font-weight="bold" text-anchor="middle" fill="#ffffff">Rhythm Practice</text>
  <!-- Toolbar -->
  <rect x="40" y="130" width="900" height="70" fill="#dee2e6" stroke="#495057" stroke-width="2"/>
  <text x="55" y="152" font-family="monospace" font-size="14" fill="#495057">Controls Toolbar</text>
  <!-- New Exercise button -->
  <rect x="65" y="157" width="160" height="35" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
  <text x="145" y="180" font-family="monospace" font-size="14" text-anchor="middle" fill="#1e1e1e">New Exercise</text>
  <!-- BPM Control -->
  <rect x="260" y="150" width="260" height="50" rx="8" fill="#e5dbff" stroke="#7950f2" stroke-width="2"/>
  <text x="390" y="181" font-family="monospace" font-size="16" text-anchor="middle" fill="#1e1e1e">BPM: [ - ] [ 120 ] [ + ]</text>
  <!-- Play -->
  <rect x="555" y="155" width="120" height="40" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
  <text x="615" y="181" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">PLAY</text>
  <!-- Stop -->
  <rect x="690" y="155" width="120" height="40" rx="8" fill="#ffc9c9" stroke="#c92a2a" stroke-width="2"/>
  <text x="750" y="181" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">STOP</text>
  <!-- Score display -->
  <rect x="50" y="220" width="880" height="380" fill="#ffffff" stroke="#495057" stroke-width="2"/>
  <text x="60" y="248" font-family="monospace" font-size="16" fill="#868e96">Sheet Music Display (VexFlow)</text>
  <!-- Staff lines -->
  <line x1="60" y1="310" x2="920" y2="310" stroke="#343a40" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="325" x2="920" y2="325" stroke="#343a40" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="340" x2="920" y2="340" stroke="#343a40" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="355" x2="920" y2="355" stroke="#343a40" stroke-width="1" opacity="0.8"/>
  <line x1="60" y1="370" x2="920" y2="370" stroke="#343a40" stroke-width="1" opacity="0.8"/>
  <!-- Note highlight -->
  <ellipse cx="195" cy="343" rx="15" ry="11" fill="#ffd43b" stroke="#f08c00" stroke-width="2"/>
  <text x="195" y="395" font-family="monospace" font-size="13" text-anchor="middle" fill="#f08c00">current</text>
  <!-- Playback bar -->
  <rect x="50" y="620" width="880" height="70" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
  <text x="60" y="643" font-family="monospace" font-size="15" fill="#1971c2">Playback Bar</text>
  <rect x="65" y="658" width="750" height="20" rx="6" fill="#dee2e6" stroke="#adb5bd" stroke-width="1"/>
  <rect x="65" y="658" width="300" height="20" rx="6" fill="#4dabf7" stroke="#1971c2" stroke-width="1"/>
  <text x="825" y="673" font-family="monospace" font-size="14" fill="#1971c2">0:04 / 0:08</text>
</svg>
