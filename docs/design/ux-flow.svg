<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480">
  <rect width="1000" height="480" fill="#ffffff"/>
  <text x="500" y="44" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e1e1e">Rhythm App — UX Flow</text>
  <!-- Row 1 -->
  <rect x="80" y="80" width="180" height="70" rx="10" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
  <text x="170" y="122" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">Open App</text>
  <rect x="380" y="80" width="200" height="70" rx="10" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
  <text x="480" y="122" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">Generate Exercise</text>
  <rect x="700" y="80" width="200" height="70" rx="10" fill="#e5dbff" stroke="#7950f2" stroke-width="2"/>
  <text x="800" y="122" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">Adjust BPM</text>
  <!-- Row 1 arrows -->
  <line x1="260" y1="115" x2="380" y2="115" stroke="#2f9e44" stroke-width="2" marker-end="url(#arr)"/>
  <text x="320" y="108" font-family="monospace" font-size="14" text-anchor="middle" fill="#555">Load</text>
  <line x1="580" y1="115" x2="700" y2="115" stroke="#7950f2" stroke-width="2" marker-end="url(#arr)"/>
  <text x="640" y="108" font-family="monospace" font-size="14" text-anchor="middle" fill="#555">Set BPM</text>
  <!-- Row 2 -->
  <rect x="700" y="300" width="200" height="70" rx="10" fill="#ffd8a8" stroke="#e67700" stroke-width="2"/>
  <text x="800" y="342" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">Playback / Play</text>
  <rect x="380" y="300" width="200" height="70" rx="10" fill="#fff3bf" stroke="#f08c00" stroke-width="2"/>
  <text x="480" y="342" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">Highlight Notes</text>
  <rect x="80" y="300" width="200" height="70" rx="10" fill="#ffc9c9" stroke="#c92a2a" stroke-width="2"/>
  <text x="180" y="342" font-family="monospace" font-size="18" text-anchor="middle" fill="#1e1e1e">New Exercise</text>
  <!-- Row 2 arrows -->
  <line x1="800" y1="150" x2="800" y2="300" stroke="#e67700" stroke-width="2" marker-end="url(#arr)"/>
  <text x="815" y="230" font-family="monospace" font-size="14" fill="#555">Play</text>
  <line x1="700" y1="335" x2="580" y2="335" stroke="#f08c00" stroke-width="2" marker-end="url(#arr)"/>
  <text x="640" y="325" font-family="monospace" font-size="14" text-anchor="middle" fill="#555">Tick ahead</text>
  <line x1="380" y1="335" x2="280" y2="335" stroke="#c92a2a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="330" y="325" font-family="monospace" font-size="14" text-anchor="middle" fill="#555">Complete</text>
  <!-- Loop back arrow -->
  <path d="M 80 300 L 80 215 L 170 215 L 170 150" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="30" y="240" font-family="monospace" font-size="13" fill="#2f9e44">Next</text>
  <!-- BPM re-adjust loop -->
  <path d="M 700 95 Q 640 50 580 95" fill="none" stroke="#7950f2" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="640" y="48" font-family="monospace" font-size="13" text-anchor="middle" fill="#7950f2">Re-adjust BPM</text>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>
